<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>NatDex</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>

  <div id="hero">
    <h1>NatDex</h1>
    <p>
      Browse the full National Dex card database. Scroll to explore, filter, and search as features are added.
    </p>
  </div>

  <div id="card-grid"></div>

  <!-- Move the top bar *here* -->
  <div id="top-bar">
    <div class="top-bar-content">
      <span class="logo">NatDex</span>
      <div class="top-controls">
        <input type="text" id="filter-text" placeholder="Search cards…">
<select id="type-dropdown" class="filter-dropdown">
  <option value="all">All Types</option>
  <option value="tcg">TCG/OCG Cards</option>
  <option value="rush">Rush Duel</option>
  <option value="real">Real Cards</option>
  <option value="fake">Not Cards</option>
  <option value="token">Tokens</option>
  <option value="vg">Video Game</option>
  <option value="manga">Manga</option>
  <option value="nope">Missing</option>
</select>
        <button id="back-to-top">Top</button>
        <a href="#" id="login-link">Login</a>
        <a href="#" id="socials-link">Socials</a>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>

</html>
